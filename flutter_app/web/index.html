<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="description" content="Harisree Warehouse — stock, purchase & delivery">

  <!-- Viewport for iOS PWA keyboard handling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Harisree Warehouse">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#14523E">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Harisree Warehouse</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { -webkit-tap-highlight-color: transparent; touch-action: pan-y; }
    html {
      height: 100%;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
    }
    body {
      margin: 0;
      padding: 0;
      position: fixed;
      height: 100vh;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      overflow-y: hidden;
      background: #F5F7FA;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      -webkit-user-select: none;
      user-select: none;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    flt-glass-pane {
      touch-action: pan-y !important;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99998;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(165deg, #E8F5F0 0%, #F5F7FA 45%, #FFFFFF 100%);
      transition: opacity 0.25s ease-out;
      pointer-events: none;
    }
    #splash.removing {
      opacity: 0;
    }
    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      box-shadow: 0 8px 28px rgba(20, 82, 62, 0.18);
    }
    #splash span {
      font: 600 14px system-ui, sans-serif;
      color: #14523E;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <img src="icons/Icon-192.png" alt="" width="96" height="96" />
    <span>Harisree Warehouse</span>
  </div>
  <div id="boot" aria-live="polite">Starting…</div>
  <script>
    (function () {
      function hideSplash() {
        var el = document.getElementById('splash');
        if (!el || el.dataset.dismissed === '1') return;
        el.dataset.dismissed = '1';
        el.classList.add('removing');
        window.setTimeout(function () {
          try {
            el.remove();
          } catch (_) {}
        }, 280);
      }
      window.addEventListener('flutter-first-frame', hideSplash);
      window.setTimeout(hideSplash, 15000);
    })();
  </script>
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
