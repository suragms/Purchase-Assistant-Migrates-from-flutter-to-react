<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="description" content="Harisree Warehouse — stock, purchase & delivery">

  <!-- Viewport for iOS PWA keyboard handling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Harisree Warehouse">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#14523E">
  <meta http-equiv="Permissions-Policy" content="camera=*">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Harisree Warehouse</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var host = location.hostname;
      var correct = 'purchase-assiastant.vercel.app';
      var wrong = {
        'purchase-assistant.vercel.app': 1,
        'purchase-assastant.vercel.app': 1,
        'purchase-assiantant.vercel.app': 1
      };
      if (host === correct) return;
      if (host === 'localhost' || host === '127.0.0.1') return;
      if (wrong[host]) {
        location.replace(
          'https://' + correct + location.pathname + location.search + location.hash
        );
      }
    })();
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html {
      height: 100%;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
    }
    body {
      margin: 0;
      padding: 0;
      position: fixed;
      height: 100vh;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      overflow-y: hidden;
      background: #F5F7FA;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
    }
    /* Flutter web text fields use DOM overlays — body user-select:none blocks typing. */
    input, textarea, [contenteditable="true"] {
      -webkit-user-select: text;
      user-select: text;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    #flutter-view,
    flt-glass-pane,
    flt-scene-host {
      width: 100% !important;
      height: 100vh !important;
      min-height: 100vh;
    }
    flt-glass-pane {
      touch-action: auto !important;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99998;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: linear-gradient(165deg, #E8F5F0 0%, #F5F7FA 45%, #FFFFFF 100%);
      transition: opacity 0.25s ease-out;
      pointer-events: none;
    }
    #splash.removing {
      opacity: 0;
    }
    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      box-shadow: 0 8px 28px rgba(20, 82, 62, 0.18);
    }
    #splash span {
      font: 600 14px system-ui, sans-serif;
      color: #14523E;
      letter-spacing: 0.02em;
    }
    #boot {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      z-index: 99999;
      text-align: center;
      font: 600 13px system-ui, sans-serif;
      color: #14523E;
      pointer-events: none;
    }
    #boot.boot-error {
      color: #b91c1c;
      pointer-events: auto;
      padding: 0 16px;
      line-height: 1.4;
    }
    #wrong-host {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      text-align: center;
      background: #F5F7FA;
      font: 600 15px system-ui, sans-serif;
      color: #14523E;
    }
    #wrong-host a {
      color: #0F766E;
      font-weight: 700;
    }
    #wrong-host.show {
      display: flex;
    }
  </style>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <img src="icons/Icon-192.png" alt="" width="96" height="96" />
    <span>Harisree Warehouse</span>
  </div>
  <div id="wrong-host" role="alert">
    <p>Wrong link — this hostname causes blank screens and failed saves.</p>
    <p>Bookmark only:</p>
    <p><a href="https://purchase-assiastant.vercel.app/home">Open Harisree Warehouse</a></p>
  </div>
  <div id="boot" aria-live="polite">Starting…</div>
  <script>
    (function () {
      var host = location.hostname;
      var correct = 'purchase-assiastant.vercel.app';
      var wrong = {
        'purchase-assistant.vercel.app': 1,
        'purchase-assastant.vercel.app': 1,
        'purchase-assiantant.vercel.app': 1
      };
      if (!wrong[host]) return;
      var target =
        'https://' + correct + location.pathname + location.search + location.hash;
      var wh = document.getElementById('wrong-host');
      if (wh) {
        wh.classList.add('show');
        var link = wh.querySelector('a');
        if (link) link.href = target;
      }
      var splash = document.getElementById('splash');
      if (splash) splash.style.display = 'none';
      var boot = document.getElementById('boot');
      if (boot) boot.style.display = 'none';
    })();
  </script>
  <script>
    (function () {
      var boot = document.getElementById('boot');
      function setBoot(msg) {
        if (boot && !boot.classList.contains('boot-error')) boot.textContent = msg;
      }
      // Do NOT hide splash on flutter-first-frame — the engine's first frame can be
      // empty/transparent, which left a blank gray body on desktop. Dart removes
      // #splash via removeBootOverlayIfPresent() once bootstrap UI is painted.
      window.setTimeout(function () {
        setBoot('Connecting to server…');
      }, 3000);
      window.setTimeout(function () {
        setBoot('Loading app (large download on first visit)…');
      }, 12000);
      window.setTimeout(function () {
        setBoot('Still loading — server may be waking up. Please wait…');
      }, 45000);
      // Safety: if Dart never calls removeBootOverlayIfPresent (dev server / stale tab),
      // do not leave #splash blocking the Flutter canvas forever.
      window.setTimeout(function () {
        var splash = document.getElementById('splash');
        if (splash && splash.dataset.dismissed !== '1') {
          splash.dataset.dismissed = '1';
          splash.classList.add('removing');
          setTimeout(function () { splash.remove(); }, 280);
        }
        var boot = document.getElementById('boot');
        if (boot) boot.remove();
      }, 20000);
    })();
  </script>
  <script>
    (function () {
      var host = location.hostname;
      // Flutter `run -d chrome` serves via the dev compiler — main.dart.js HEAD is not
      // a reliable production bundle probe on localhost; skip to avoid false wrong-host UI.
      if (host === 'localhost' || host === '127.0.0.1' || host === '[::1]') return;

      var boot = document.getElementById('boot');
      function showBootError(msg) {
        if (!boot) return;
        boot.classList.add('boot-error');
        boot.textContent = msg;
      }
      fetch('main.dart.js', { method: 'HEAD', cache: 'no-store' })
        .then(function (r) {
          var ct = (r.headers.get('content-type') || '').toLowerCase();
          if (!r.ok || ct.indexOf('javascript') === -1) {
            var wh = document.getElementById('wrong-host');
            if (wh) wh.classList.add('show');
            showBootError(
              'Wrong site — use https://purchase-assiastant.vercel.app (not purchase-assistant).'
            );
          }
        })
        .catch(function () {
          showBootError(
            'Could not load the app bundle. Check network, then open https://purchase-assiastant.vercel.app'
          );
        });
    })();
  </script>
  <script>
    // Harisree on Vercel: do NOT register a service worker. Purge legacy SW without
    // reloading the tab — reload loops caused permanent blank screens on desktop.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        return Promise.all(regs.map(function (r) { return r.unregister(); }));
      }).catch(function () {});
    })();
    window.addEventListener('error', function (ev) {
      var boot = document.getElementById('boot');
      if (!boot || boot.classList.contains('boot-error')) return;
      boot.classList.add('boot-error');
      boot.textContent =
        'App error — hard refresh (Ctrl+Shift+R). If it continues, clear site data for this URL.';
      console.error(ev.error || ev.message);
    });
  </script>
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
