# Local PostgreSQL + Redis for HEXA backend
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hexa
      POSTGRES_PASSWORD: hexa
      POSTGRES_DB: hexa
    ports:
      - "5432:5432"
    volumes:
      - hexa_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend-dotnet:
    build:
      context: ./backend-dotnet
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=hexa;Username=hexa;Password=hexa
      - ConnectionStrings__Redis=redis:6379
    ports:
      - "5131:8080"
    depends_on:
      - postgres
      - redis

volumes:
  hexa_pg:
