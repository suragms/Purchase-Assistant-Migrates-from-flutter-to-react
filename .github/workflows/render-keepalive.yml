name: Render keep-alive

on:
  schedule:
    # Every 10 minutes — Render free tier spins down after 15 min idle
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: curl -sSf --max-time 10 "${{ secrets.API_HEALTH_URL }}" > /dev/null
      - name: Ping API ready endpoint
        run: curl -sSf --max-time 10 "${{ secrets.API_HEALTH_URL }}/ready" > /dev/null
