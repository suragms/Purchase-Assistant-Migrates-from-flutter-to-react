name: Weekly DB Backup

on:
  schedule:
    # Weekly: Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  PG_VERSION: '16'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump
        run: sudo apt-get update && sudo apt-get install -y postgresql-client-${{ env.PG_VERSION }}

      - name: Dump database
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="hexa_backup_${TIMESTAMP}.sql.gz"
          PGPASSWORD="${{ secrets.DB_PASSWORD }}" pg_dump \
            --host="${{ secrets.DB_HOST }}" \
            --port="${{ secrets.DB_PORT }}" \
            --username="${{ secrets.DB_USER }}" \
            --dbname="${{ secrets.DB_NAME }}" \
            --no-owner \
            --no-acl \
            --verbose \
            | gzip > /tmp/${FILENAME}
          echo "Backup created: ${FILENAME} ($(stat -c%s /tmp/${FILENAME}) bytes)"

      - name: Upload backup to external storage
        run: |
          echo "Upload backup placeholder — replace with S3/SFTP/Blob storage upload"
          # Example (uncomment and configure secrets):
          # aws s3 cp /tmp/hexa_backup_*.sql.gz s3://${{ secrets.BACKUP_BUCKET }}/db-backups/
