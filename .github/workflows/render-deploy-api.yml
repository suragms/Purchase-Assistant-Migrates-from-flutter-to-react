name: Deploy API to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend-dotnet/**'
      - 'Dockerfile'
      - 'render.yaml'
      - '.github/workflows/render-deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: >
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
