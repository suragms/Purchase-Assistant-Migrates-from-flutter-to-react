name: Post-Deploy Smoke Tests

on:
  workflow_run:
    workflows: ['Deploy API to Render']
    types:
      - completed
  workflow_dispatch:

jobs:
  post-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait for deployment to settle
        run: sleep 15

      - name: Root endpoint is reachable
        run: |
          URL="${{ secrets.PRODUCTION_API_URL }}/"
          HTTP_CODE=$(curl -sSf --max-time 15 -o /tmp/smoke_response.json -w "%{http_code}" "$URL")
          echo "HTTP $HTTP_CODE ← $URL"
          [ "$HTTP_CODE" = "200" ] || exit 1
          echo "OK: $(head -c 200 /tmp/smoke_response.json)"

      - name: Catalog endpoint returns 401 (auth required)
        run: |
          URL="${{ secrets.PRODUCTION_API_URL }}/v1/businesses/00000000-0000-0000-0000-000000000000/catalog-items"
          HTTP_CODE=$(curl -sSf --max-time 15 -o /tmp/smoke_auth.json -w "%{http_code}" "$URL")
          echo "HTTP $HTTP_CODE ← $URL"
          [ "$HTTP_CODE" = "401" ] || exit 1

      - name: Swagger spec is accessible
        run: |
          URL="${{ secrets.PRODUCTION_API_URL }}/swagger/v1/swagger.json"
          HTTP_CODE=$(curl -sSf --max-time 15 -o /tmp/swagger.json -w "%{http_code}" "$URL")
          echo "HTTP $HTTP_CODE ← $URL"
          [ "$HTTP_CODE" = "200" ] || exit 1
