# Render Blueprint reference — mirror these in the Dashboard if not using Blueprint sync.
# my-purchases-api -> rootDir backend-dotnet, healthCheckPath /health/live
services:
  - type: web
    name: my-purchases-api
    runtime: docker
    rootDir: backend-dotnet
    autoDeploy: true
    autoDeployTrigger: commit
    branch: main
    buildCommand: dotnet restore src/Api/PurchaseAssistant.Api.csproj && dotnet publish src/Api/PurchaseAssistant.Api.csproj -c Release -o out
    startCommand: dotnet out/PurchaseAssistant.Api.dll
    healthCheckPath: /health/live
    envVars:
      - key: APP_ENV
        value: production
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: harisree-db
          property: connectionString
      # Set in dashboard (never commit secrets):
      # Jwt__Secret, CORS_ORIGINS, etc.
